name: Build and Deploy Myfolio

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/myfolio:latest

  deploy:
    runs-on: self-hosted
    needs: build

    env:
      CONTAINER: myfolio
      ENV_FILE: /home/envs/myfolio.env

    steps:
      - name: Verify environment file
        run: |
          if [ ! -f ${{ env.ENV_FILE }} ]; then
            echo "❌ Environment file not found at ${{ env.ENV_FILE }}"
            exit 1
          fi
          echo "✅ Environment file verified"

      - name: Pull latest image
        run: |
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/myfolio:latest

      - name: Stop and remove old container
        run: |
          docker stop ${{ env.CONTAINER }} || true
          docker rm ${{ env.CONTAINER }} || true

      - name: Run new container
        run: |
          docker run -d \
            --name ${{ env.CONTAINER }} \
            --network custom_bridge \
            --ip 172.25.0.4 \
            --env-file ${{ env.ENV_FILE }} \
            -p 3000:3000 \
            --restart unless-stopped \
            ${{ secrets.DOCKERHUB_USERNAME }}/myfolio:latest
          echo "🚀 Myfolio deployed successfully"

      - name: Health check
        run: |
          sleep 5
          docker ps | grep ${{ env.CONTAINER }}
          docker logs --tail 20 ${{ env.CONTAINER }}

      - name: Cleanup old images
        run: |
          docker image prune -f || true

      - name: On failure — fetch logs
        if: failure()
        run: |
          echo "❌ Deployment failed — fetching logs..."
          docker logs ${{ env.CONTAINER }} || true