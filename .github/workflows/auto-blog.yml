name: Auto-Blog Cron

on:
  schedule:
    # Runs Mon, Wed, Fri at midnight UTC
    - cron: '0 0 * * 1,3,5'
  workflow_dispatch: # Allows you to manually trigger it from GitHub UI

jobs:
  run-cron:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Auto-Blog Endpoint
        run: |
          curl -X POST "https://relayworks.dev/api/cron/auto-blog" \
          -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
          --fail || echo "Cron job failed, but workflow will continue"
