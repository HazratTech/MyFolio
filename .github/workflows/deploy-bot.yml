name: Deploy Live Chat Bot

on:
  push:
    branches: [ "main", "master" ]
    paths:
      - 'live-chat-bot/**'
      - '.github/workflows/deploy-bot.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: ./live-chat-bot
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/live-chat-bot:latest

  deploy:
    runs-on: self-hosted
    needs: build

    env:
      CONTAINER: live-chat-bot
      ENV_FILE: /home/envs/myfolio.env

    steps:
      - name: Verify environment file
        run: |
          if [ ! -f ${{ env.ENV_FILE }} ]; then
            echo "❌ Environment file not found at ${{ env.ENV_FILE }}"
            exit 1
          fi
          echo "✅ Environment file verified"

      - name: Pull latest image
        run: |
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/live-chat-bot:latest

      - name: Stop and remove old container
        run: |
          docker stop ${{ env.CONTAINER }} || true
          docker rm ${{ env.CONTAINER }} || true

      - name: Run new container
        run: |
          docker run -d \
            --name ${{ env.CONTAINER }} \
            --network custom_bridge \
            --env-file ${{ env.ENV_FILE }} \
            --restart unless-stopped \
            ${{ secrets.DOCKERHUB_USERNAME }}/live-chat-bot:latest
          echo "🚀 Discord Live Chat Bot deployed successfully"

      - name: Health check
        run: |
          sleep 5
          docker ps | grep ${{ env.CONTAINER }}
          docker logs --tail 20 ${{ env.CONTAINER }}

      - name: Cleanup old images
        run: |
          docker image prune -f || true

      - name: On failure — fetch logs
        if: failure()
        run: |
          echo "❌ Deployment failed — fetching logs..."
          docker logs ${{ env.CONTAINER }} || true
